<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1e1e2e"/>
  <rect x="20" y="20" width="760" height="300" rx="8" fill="#24273a" stroke="#363a4f" stroke-width="1"/>
  <!-- Selected code highlight -->
  <rect x="63" y="48" width="420" height="22" fill="#313244" rx="2"/>
  <rect x="63" y="72" width="320" height="22" fill="#313244" rx="2"/>
  <rect x="63" y="96" width="360" height="22" fill="#313244" rx="2"/>
  <text x="40" y="64" font-family="monospace" font-size="14" fill="#6c7086">1</text>
  <text x="65" y="64" font-family="monospace" font-size="14" fill="#cdd6f4">def broken_function(items):</text>
  <text x="40" y="88" font-family="monospace" font-size="14" fill="#6c7086">2</text>
  <text x="65" y="88" font-family="monospace" font-size="14" fill="#cdd6f4">    for i in rang(len(items)):</text>
  <text x="40" y="112" font-family="monospace" font-size="14" fill="#6c7086">3</text>
  <text x="65" y="112" font-family="monospace" font-size="14" fill="#cdd6f4">        print(items[i])</text>
  <!-- Keyboard shortcut box -->
  <rect x="220" y="165" width="320" height="70" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="280" y="195" font-family="sans-serif" font-size="13" fill="#89b4fa">Select code, then press:</text>
  <rect x="280" y="205" width="80" height="28" rx="5" fill="#45475a"/>
  <text x="296" y="224" font-family="monospace" font-size="13" fill="#cdd6f4" font-weight="bold">Ctrl</text>
  <text x="368" y="224" font-family="sans-serif" font-size="13" fill="#6c7086">+</text>
  <rect x="380" y="205" width="44" height="28" rx="5" fill="#45475a"/>
  <text x="392" y="224" font-family="monospace" font-size="13" fill="#cdd6f4" font-weight="bold">⇧</text>
  <text x="432" y="224" font-family="sans-serif" font-size="13" fill="#6c7086">+</text>
  <rect x="444" y="205" width="28" height="28" rx="5" fill="#45475a"/>
  <text x="452" y="224" font-family="monospace" font-size="13" fill="#cdd6f4" font-weight="bold">F</text>
  <text x="40" y="370" font-family="sans-serif" font-size="16" fill="#cdd6f4" font-weight="bold">2. Select any broken code — press Ctrl+Shift+F</text>
  <text x="40" y="400" font-family="sans-serif" font-size="13" fill="#6c7086">Works on any selection. No error message needed — just select and fix.</text>
</svg>
